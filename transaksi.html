    <script src="admin-app.js?v=2"></script>
    <script>
        setActiveNav('transaksi');
        // Sidebar toggle for mobile
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('hidden-mobile');
            overlay.classList.toggle('hidden');
        }

        let allTx = [];

        async function loadTx() {
            allTx = await DB.load('transaksi');
            renderTable([...allTx].reverse());
        }

        function renderTable(list) {
            const tbody = document.getElementById('txTable');
            const empty = document.getElementById('emptyTx');
            if (list.length === 0) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');
            tbody.innerHTML = list.map(t => {
                const metodeBadge = { 'Tunai': 'bg-emerald-100 text-emerald-700', 'Transfer': 'bg-emerald-100 text-emerald-700', 'QRIS': 'bg-emerald-100 text-emerald-700' };
                const totalItem = t.items.reduce((s, i) => s + i.qty, 0);
                return `
          <tr class="hover:bg-gray-50 transition-colors cursor-pointer" onclick="openDetail(${t.id})">
            <td class="px-6 py-4 font-mono text-sm font-semibold text-emerald-700">${t.nomorFaktur}</td>
            <td class="px-6 py-4">
              <p class="text-sm font-medium text-gray-800">${formatTanggal(t.waktu)}</p>
              <p class="text-xs text-gray-500">${formatWaktu(t.waktu)}</p>
            </td>
            <td class="px-6 py-4 text-sm text-gray-600">${totalItem} item</td>
            <td class="px-6 py-4 font-bold text-gray-800">${formatRp(t.total)}</td>
            <td class="px-6 py-4"><span class="px-2.5 py-1 rounded-full text-xs font-medium ${metodeBadge[t.metodeBayar] || 'bg-gray-100 text-gray-600'}">${t.metodeBayar}</span></td>
            <td class="px-6 py-4">
              <button class="text-emerald-700 hover:text-emerald-900 text-xs font-medium underline">Lihat detail</button>
            </td>
          </tr>
        `;
            }).join('');
        }

        function openDetail(id) {
            const t = allTx.find(x => x.id === id);
            if (!t) return;
            document.getElementById('detailContent').innerHTML = `
        <div class="bg-gray-50 rounded-xl p-4 space-y-2">
          <div class="flex justify-between text-sm"><span class="text-gray-500">No. Faktur</span><span class="font-mono font-bold text-emerald-700">${t.nomorFaktur}</span></div>
          <div class="flex justify-between text-sm"><span class="text-gray-500">Tanggal</span><span class="font-medium">${formatTanggal(t.waktu)} ${formatWaktu(t.waktu)}</span></div>
          <div class="flex justify-between text-sm"><span class="text-gray-500">Metode Bayar</span><span class="font-medium">${t.metodeBayar}</span></div>
          ${t.meja && t.meja !== '-' ? `<div class="flex justify-between text-sm"><span class="text-gray-500">Meja / Pelanggan</span><span class="font-medium font-bold text-emerald-700">${t.meja}</span></div>` : ''}
        </div>
        <div>
          <h4 class="font-semibold text-gray-700 mb-3 text-sm">Item yang Dibeli</h4>
          <div class="space-y-2">
            ${t.items.map(i => `
              <div class="flex justify-between items-start bg-gray-50 rounded-xl px-4 py-2.5">
                <div>
                  <p class="font-medium text-gray-800 text-sm uppercase">${i.nama} ${i.varian ? `<span class="text-emerald-700 text-[10px] ml-1">[${i.varian}]</span>` : ''}</p>
                  <p class="text-gray-500 text-xs">${formatRp(i.harga)} × ${i.qty}</p>
                  ${i.catatan ? `<p class="text-emerald-400 text-[10px] italic mt-1 font-medium">* ${i.catatan}</p>` : ''}
                </div>
                <span class="font-bold text-gray-700 text-sm">${formatRp(i.harga * i.qty)}</span>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="border-t border-gray-100 pt-4 space-y-2">
          <div class="flex justify-between text-sm text-gray-500"><span>Subtotal</span><span>${formatRp(t.subtotal)}</span></div>
          ${t.diskon > 0 ? `<div class="flex justify-between text-sm text-gray-500"><span>Diskon</span><span class="text-rose-500">-${formatRp(t.diskon)}</span></div>` : ''}
          <div class="flex justify-between text-sm text-gray-500"><span>Pajak (${((t.pajak / (t.subtotal - (t.diskon || 0))) * 100).toFixed(0)}%)</span><span>${formatRp(t.pajak)}</span></div>
          <div class="flex justify-between font-bold text-base text-gray-800 pt-2 border-t"><span>TOTAL</span><span class="text-emerald-700">${formatRp(t.total)}</span></div>
          <div class="flex justify-between text-sm text-gray-500"><span>Dibayar</span><span>${formatRp(t.dibayar)}</span></div>
          <div class="flex justify-between text-sm font-semibold text-green-700"><span>Kembalian</span><span>${formatRp(t.kembalian)}</span></div>
        </div>
      `;
            document.getElementById('modalDetail').classList.remove('hidden');
            document.getElementById('modalDetail').classList.add('flex');
        }

        function closeDetail() {
            document.getElementById('modalDetail').classList.add('hidden');
            document.getElementById('modalDetail').classList.remove('flex');
        }

        let filterTimeout;
        function applyFilter() {
            clearTimeout(filterTimeout);
            filterTimeout = setTimeout(() => {
                const q = document.getElementById('searchTx').value.toLowerCase();
                const from = document.getElementById('filterFrom').value;
                const to = document.getElementById('filterTo').value;
                let filtered = [...allTx].reverse();
                if (q) filtered = filtered.filter(t => t.nomorFaktur.toLowerCase().includes(q));
                if (from) filtered = filtered.filter(t => new Date(t.waktu) >= new Date(from));
                if (to) filtered = filtered.filter(t => new Date(t.waktu) <= new Date(to + 'T23:59:59'));
                renderTable(filtered);
            }, 300);
        }

        document.getElementById('searchTx').addEventListener('input', applyFilter);
        document.getElementById('filterFrom').addEventListener('change', applyFilter);
        document.getElementById('filterTo').addEventListener('change', applyFilter);

        function resetFilter() {
            document.getElementById('searchTx').value = '';
            document.getElementById('filterFrom').value = '';
            document.getElementById('filterTo').value = '';
            renderTable([...allTx].reverse());
        }

        async function hapusSemua() {
            if (!confirm('Hapus semua riwayat transaksi? Tindakan ini tidak bisa dibatalkan.')) return;
            await DB.save('transaksi', []);
            allTx = [];
            renderTable([]);
        }

        setActiveNav('transaksi');
        setInterval(() => {
            const now = new Date();
            if (document.getElementById('datetimeDisplay')) {
                document.getElementById('datetimeDisplay').textContent = 
                    now.toLocaleDateString('id-ID', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' }) + 
                    ' • ' + now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }
        }, 1000);

        loadTx();
    </script>
</body>

</html>
